spring.application.name=SecondHandTransaction
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ssXXX

# Server
server.port=${PORT:8080}

# H2 Database（文件存储，MODE=MySQL 兼容 MySQL 语法）
spring.datasource.url=jdbc:h2:file:./data/secondhand;AUTO_SERVER=TRUE;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console（浏览器里查看数据库，可选）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# JPA / Hibernate：启动时自动更新表结构（不删数据）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.root=INFO
logging.level.org.springframework.security=INFO
