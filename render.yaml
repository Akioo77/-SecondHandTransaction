services:
  - type: web
    name: secondhand-backend
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/SecondHandTransaction-0.0.1-SNAPSHOT.jar
    plan: free
    region: oregon
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
